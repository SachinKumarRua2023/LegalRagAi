services:
  - type: web
    name: legal-rag-api
    env: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    envVars:
      - key: LLM_PROVIDER
        value: auto
      - key: EMBEDDING_MODEL
        value: local
      - key: CHROMA_DB_PATH
        value: ./chroma_db
      - key: CHROMA_COLLECTION_NAME
        value: legal_cases
      - key: DATA_RAW_PATH
        value: ./data/raw
      - key: DATA_PROCESSED_PATH
        value: ./data/processed
      - key: DATA_UPLOADS_PATH
        value: ./data/uploads
      # Set these in Render dashboard → Environment (secret)
      - key: GROQ_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
