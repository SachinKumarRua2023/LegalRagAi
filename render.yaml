services:
  - type: web
    name: legal-rag-api
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: EMBEDDING_MODEL
        value: local
      # Vector DB: Using Pinecone (cloud - persistent storage)
      - key: VECTOR_DB_PROVIDER
        value: pinecone
      - key: PINECONE_INDEX_NAME
        value: legal-rag
      - key: PINECONE_CLOUD
        value: aws
      - key: PINECONE_REGION
        value: us-east-1
      - key: DATA_RAW_PATH
        value: ./data/raw
      - key: DATA_PROCESSED_PATH
        value: ./data/processed
      - key: DATA_UPLOADS_PATH
        value: ./data/uploads
      # Set these in Render dashboard → Environment (secret)
      - key: PINECONE_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
