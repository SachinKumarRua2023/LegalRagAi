services:
  - type: web
    name: legal-rag-api
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.api:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: EMBEDDING_MODEL
        value: google
      # Vector DB: Pinecone cloud (768-dim index for Google embeddings)
      - key: VECTOR_DB_PROVIDER
        value: pinecone
      - key: PINECONE_INDEX_NAME
        value: legal-rag-768
      - key: PINECONE_CLOUD
        value: aws
      - key: PINECONE_REGION
        value: us-east-1
      - key: DATA_RAW_PATH
        value: ./data/raw
      - key: DATA_PROCESSED_PATH
        value: ./data/processed
      - key: DATA_UPLOADS_PATH
        value: ./data/uploads
      - key: SUPPORT_EMAIL
        value: seekhowithrua@gmail.com
      # Set these in Render dashboard → Environment (secret)
      - key: PINECONE_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ODOO_URL
        sync: false
      - key: ODOO_DB
        sync: false
      - key: ODOO_USER
        sync: false
      - key: ODOO_PASS
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: VAPI_API_KEY
        sync: false
      - key: VAPI_ASSISTANT_ID
        sync: false
      - key: VAPI_PHONE_NUMBER_ID
        sync: false
      - key: HUMAN_TRANSFER_NUMBER
        sync: false
