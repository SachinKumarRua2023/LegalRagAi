services:
  - type: web
    name: legal-rag-api
    env: python
    plan: free
    region: oregon
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: LLM_PROVIDER
        value: auto
      - key: EMBEDDING_MODEL
        value: local
      - key: CHROMA_DB_PATH
        value: ./chroma_db
      - key: CHROMA_COLLECTION_NAME
        value: legal_cases
      - key: DATA_RAW_PATH
        value: ./data/raw
      - key: DATA_PROCESSED_PATH
        value: ./data/processed
      - key: DATA_UPLOADS_PATH
        value: ./data/uploads
      # Set these secret keys in Render dashboard → Environment
      - key: GROQ_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
